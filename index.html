<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的個人儀表板</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --bg2: #141417;
    --bg3: #1c1c21;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8e8ed;
    --text2: #9b9ba8;
    --text3: #5c5c6e;
    --accent-news: #e8a44a;
    --accent-market: #4ade80;
    --accent-jp: #f472b6;
    --accent-en: #60a5fa;
    --font: 'Noto Sans TC', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* Header */
  header {
    padding: 2rem 2rem 0;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .site-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  .date-display {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  /* Tab nav */
  nav {
    display: flex;
    gap: 0;
  }

  .tab-btn {
    background: none;
    border: none;
    padding: 0.75rem 1.5rem;
    font-family: var(--font);
    font-size: 0.875rem;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    position: relative;
    bottom: -1px;
  }

  .tab-btn:hover { color: var(--text2); }

  .tab-btn.active-news   { color: var(--accent-news);   border-bottom-color: var(--accent-news);   }
  .tab-btn.active-market { color: var(--accent-market); border-bottom-color: var(--accent-market); }
  .tab-btn.active-jp     { color: var(--accent-jp);     border-bottom-color: var(--accent-jp);     }
  .tab-btn.active-en     { color: var(--accent-en);     border-bottom-color: var(--accent-en);     }

  .tab-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
  }

  /* Panels */
  .panel { display: none; padding: 2rem; }
  .panel.active { display: block; }

  /* Section title */
  .sec-title {
    font-size: 0.7rem;
    font-family: var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  /* Loading spinner */
  .loader {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--text3);
    font-size: 0.875rem;
    padding: 1.5rem 0;
  }
  .spin {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--text2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .err {
    color: #f87171;
    font-size: 0.8rem;
    padding: 0.5rem 0;
    font-family: var(--mono);
  }

  /* ---- NEWS PANEL ---- */
  .news-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  @media(max-width: 700px) { .news-grid { grid-template-columns: 1fr; } }

  .news-section { }

  .news-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .news-card:hover { border-color: var(--border2); }

  .news-card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.5rem;
    gap: 0.5rem;
  }

  .news-headline {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .news-tag {
    font-size: 0.65rem;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
    background: rgba(232,164,74,0.15);
    color: var(--accent-news);
    border: 1px solid rgba(232,164,74,0.3);
  }

  .news-sum {
    font-size: 0.82rem;
    color: var(--text2);
    line-height: 1.6;
  }

  .news-meta {
    margin-top: 0.5rem;
    font-size: 0.7rem;
    font-family: var(--mono);
    color: var(--text3);
  }

  .refresh-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.4rem 1rem;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 0.8rem;
    cursor: pointer;
    margin-bottom: 1.5rem;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--border2); color: var(--text); }

  /* ---- MARKET PANEL ---- */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .market-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: border-color 0.2s;
  }
  .market-card:hover { border-color: var(--border2); }

  .market-name {
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
  }

  .market-price {
    font-size: 1.5rem;
    font-weight: 500;
    font-family: var(--mono);
    color: var(--text);
    margin-bottom: 0.25rem;
  }

  .market-change {
    font-size: 0.8rem;
    font-family: var(--mono);
  }
  .up { color: #4ade80; }
  .down { color: #f87171; }
  .flat { color: var(--text3); }

  .market-time {
    font-size: 0.65rem;
    color: var(--text3);
    font-family: var(--mono);
    margin-top: 0.25rem;
  }

  /* ---- JAPANESE PANEL ---- */
  .jp-progress {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .jp-progress-bar-wrap {
    background: var(--bg3);
    height: 6px;
    border-radius: 3px;
    margin: 0.75rem 0 0.5rem;
    overflow: hidden;
  }

  .jp-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-jp), #c084fc);
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .jp-progress-label {
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--text3);
  }

  .lesson-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .lesson-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: var(--font);
  }
  .lesson-btn:hover { border-color: rgba(244,114,182,0.4); }
  .lesson-btn.current { border-color: var(--accent-jp); background: rgba(244,114,182,0.08); }
  .lesson-btn.done { opacity: 0.5; }

  .lesson-num {
    font-size: 0.65rem;
    font-family: var(--mono);
    color: var(--text3);
    margin-bottom: 0.25rem;
  }

  .lesson-title {
    font-size: 0.82rem;
    color: var(--text);
    font-weight: 500;
  }

  .lesson-tag-jp {
    font-size: 0.75rem;
    color: var(--accent-jp);
    margin-top: 0.2rem;
  }

  .jp-study-area {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    min-height: 300px;
  }

  .jp-lesson-title {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--accent-jp);
    margin-bottom: 0.25rem;
  }
  .jp-lesson-sub {
    font-size: 0.8rem;
    color: var(--text3);
    font-family: var(--mono);
    margin-bottom: 1.25rem;
  }

  .vocab-table { width: 100%; border-collapse: collapse; }
  .vocab-table th {
    font-size: 0.65rem;
    font-family: var(--mono);
    color: var(--text3);
    text-align: left;
    padding: 0.4rem 0.75rem;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.08em;
  }
  .vocab-table td {
    padding: 0.6rem 0.75rem;
    font-size: 0.85rem;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .vocab-table tr:last-child td { border-bottom: none; }
  .vocab-jp { color: var(--text); font-weight: 500; }
  .vocab-kana { color: var(--accent-jp); font-size: 0.8rem; }
  .vocab-zh { color: var(--text2); }

  .jp-grammar {
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
  }
  .jp-grammar-title {
    font-size: 0.7rem;
    font-family: var(--mono);
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .grammar-item {
    margin-bottom: 0.75rem;
    background: var(--bg3);
    border-radius: 8px;
    padding: 0.75rem 1rem;
  }
  .grammar-pattern {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: #c084fc;
    margin-bottom: 0.2rem;
  }
  .grammar-ex {
    font-size: 0.82rem;
    color: var(--text2);
  }
  .grammar-zh {
    font-size: 0.78rem;
    color: var(--text3);
  }

  .jp-nav-btns {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.25rem;
  }
  .jp-nav-btn {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.6rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.82rem;
    transition: all 0.2s;
  }
  .jp-nav-btn:hover { border-color: var(--accent-jp); color: var(--accent-jp); }
  .jp-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .jp-nav-btn.primary {
    background: rgba(244,114,182,0.12);
    border-color: rgba(244,114,182,0.4);
    color: var(--accent-jp);
  }

  /* ---- ENGLISH PANEL ---- */
  .quiz-area {
    max-width: 600px;
  }

  .word-card-big {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .word-main {
    font-size: 2rem;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
    margin-bottom: 0.25rem;
    letter-spacing: 0.03em;
  }
  .word-phonetic {
    font-size: 0.85rem;
    color: var(--text3);
    font-family: var(--mono);
    margin-bottom: 0.75rem;
  }
  .word-type-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-family: var(--mono);
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(96,165,250,0.12);
    color: var(--accent-en);
    border: 1px solid rgba(96,165,250,0.3);
    margin-bottom: 1rem;
    letter-spacing: 0.06em;
  }
  .word-definition {
    font-size: 1rem;
    color: var(--text2);
    line-height: 1.7;
  }
  .word-example {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--text3);
    font-style: italic;
    border-left: 2px solid rgba(96,165,250,0.3);
    padding-left: 0.75rem;
    text-align: left;
  }
  .word-zh {
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--accent-en);
  }

  .en-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  @media(max-width:500px) { .en-options { grid-template-columns: 1fr; } }

  .option-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    text-align: left;
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.85rem;
    color: var(--text2);
    transition: all 0.2s;
  }
  .option-btn:hover { border-color: var(--border2); color: var(--text); }
  .option-btn.correct { background: rgba(74,222,128,0.08); border-color: #4ade80; color: #4ade80; }
  .option-btn.wrong   { background: rgba(248,113,113,0.08); border-color: #f87171; color: #f87171; }
  .option-btn:disabled { cursor: default; }

  .en-controls {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .en-score {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text3);
    margin-left: auto;
  }

  .mode-select {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 0.4rem 0.75rem;
    border-radius: 8px;
    font-family: var(--font);
    font-size: 0.8rem;
    cursor: pointer;
    outline: none;
  }

  .mode-select:focus { border-color: var(--accent-en); }

  .word-streak {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text3);
    text-align: center;
    margin-top: 1rem;
  }
  .streak-fire { color: #fb923c; }

  /* Phrase mode */
  .phrase-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }
  .phrase-main {
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .phrase-context {
    font-size: 0.85rem;
    color: var(--text3);
    font-style: italic;
    margin-bottom: 0.75rem;
    border-left: 2px solid rgba(96,165,250,0.3);
    padding-left: 0.75rem;
  }
  .phrase-meaning {
    font-size: 0.9rem;
    color: var(--text2);
  }
  .phrase-zh { font-size: 0.85rem; color: var(--accent-en); margin-top: 0.25rem; }

  /* Util */
  .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .small-muted { font-size: 0.75rem; color: var(--text3); font-family: var(--mono); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="site-title">我的學習儀表板</span>
    <span class="date-display" id="dateDisplay"></span>
  </div>
  <nav>
    <button class="tab-btn active-news" onclick="showTab('news')" id="tab-news">
      <span class="tab-dot" style="background:var(--accent-news)"></span>新聞
    </button>
    <button class="tab-btn" onclick="showTab('market')" id="tab-market">
      <span class="tab-dot" style="background:var(--accent-market)"></span>$$
    </button>
    <button class="tab-btn" onclick="showTab('jp')" id="tab-jp">
      <span class="tab-dot" style="background:var(--accent-jp)"></span>日文複習
    </button>
    <button class="tab-btn" onclick="showTab('en')" id="tab-en">
      <span class="tab-dot" style="background:var(--accent-en)"></span>英文複習
    </button>
  </nav>
</header>

<!-- =================== NEWS PANEL =================== -->
<div class="panel active" id="panel-news">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
    <button class="refresh-btn" style="margin:0" onclick="loadNews()">↻ 即時搜尋新聞</button>
    <span class="small-muted" id="news-update-time"></span>
    <span class="small-muted" style="color:var(--accent-news)">● Claude web_search 即時</span>
  </div>
  <div class="news-grid">
    <div>
      <div class="sec-title">🌏 國際經濟</div>
      <div id="news-global"><div class="loader"><div class="spin"></div>載入中...</div></div>
    </div>
    <div>
      <div class="sec-title">🇹🇼 台灣經濟</div>
      <div id="news-taiwan"><div class="loader"><div class="spin"></div>載入中...</div></div>
    </div>
  </div>
</div>

<!-- =================== MARKET PANEL =================== -->
<div class="panel" id="panel-market">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
    <div class="sec-title" style="margin:0">市場即時行情</div>
    <button class="refresh-btn" style="margin:0" onclick="loadMarket()">↻ 即時搜尋報價</button>
    <span class="small-muted" id="market-update-time"></span>
    <span class="small-muted" style="color:var(--accent-market)">● Claude web_search 即時</span>
  </div>
  <div id="market-grid" class="market-grid">
    <div class="loader"><div class="spin"></div>載入中...</div>
  </div>
  <p style="font-size:0.75rem;color:var(--text3);margin-top:1rem">資料由 Claude web_search 即時搜尋，僅供參考，不作為投資依據。</p>
</div>

<!-- =================== JAPANESE PANEL =================== -->
<div class="panel" id="panel-jp">
  <div class="jp-progress">
    <div class="flex-between" style="margin:0">
      <span style="font-size:0.875rem;font-weight:500">大家的日本語 第1課 ～ 第30課</span>
      <span class="small-muted" id="jp-progress-text">0 / 30</span>
    </div>
    <div class="jp-progress-bar-wrap">
      <div class="jp-progress-bar" id="jp-bar" style="width:0%"></div>
    </div>
    <div class="jp-progress-label">選擇課程開始複習</div>
  </div>

  <div class="lesson-grid" id="lesson-grid"></div>

  <div class="jp-study-area" id="jp-study-area">
    <div style="color:var(--text3);font-size:0.875rem;text-align:center;padding:3rem 0">
      ← 請選擇左方課程開始複習
    </div>
  </div>
</div>

<!-- =================== ENGLISH PANEL =================== -->
<div class="panel" id="panel-en">
  <div class="flex-between">
    <div class="sec-title" style="margin:0">多益 700 英文學習</div>
    <select class="mode-select" id="en-mode" onchange="initEnglish()">
      <option value="vocab">單字測驗</option>
      <option value="phrase">片語學習</option>
    </select>
  </div>
  <br>
  <div class="quiz-area" id="quiz-area">
    <div class="loader"><div class="spin"></div>載入中...</div>
  </div>
</div>

<script>
// ============ DATE ============
const d = new Date();
document.getElementById('dateDisplay').textContent =
  d.toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric',weekday:'short'});

// ============ TABS ============
const tabColors = {news:'news',market:'market',jp:'jp',en:'en'};
let initialized = {news:false, market:false, jp:false, en:false};

function showTab(name) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.className='tab-btn';
  });
  document.getElementById('panel-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active-'+name);

  if(!initialized[name]) {
    initialized[name]=true;
    if(name==='news') loadNews();
    if(name==='market') loadMarket();
    if(name==='jp') initJP();
    if(name==='en') initEnglish();
  }
}

// ============ CLAUDE API (for JP lesson generation only) ============
async function callClaude(prompt) {
  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 1000,
    messages: [{role:'user', content: prompt}]
  };
  const r = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  const data = await r.json();
  return data.content?.[0]?.text || '';
}

// ============ NEWS (RSS via multiple proxies) ============
const RSS_FEEDS = {
  global: [
    'https://feeds.bbci.co.uk/news/business/rss.xml',
    'https://feeds.reuters.com/reuters/businessNews',
    'https://feeds.content.dowjones.io/public/rss/mw_realtimeheadlines',
  ],
  taiwan: [
    'https://money.udn.com/rssfeed/news/1001/5588?ch=money',
    'https://money.udn.com/rssfeed/news/1001/10930?ch=money',

// Try multiple CORS proxies in order
const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchRSSWithProxy(feedUrl) {
  for (const makeProxy of PROXIES) {
    try {
      const proxyUrl = makeProxy(feedUrl);
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(9000) });
      if (!r.ok) continue;
      const text = await r.text();

      let xmlText = text;
      try { const j = JSON.parse(text); xmlText = j.contents || j.body || text; } catch {}
      if (!xmlText || xmlText.length < 200) continue;

      // Use regex to parse — handles CDATA far better than DOMParser
      const itemMatches = [...xmlText.matchAll(/<item[^>]*>([\s\S]*?)<\/item>/gi)];
      if (itemMatches.length === 0) continue;

      const channelTitleM = xmlText.match(/<channel[^>]*>[\s\S]{0,500}?<title[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/title>/i);
      const channelTitle = (channelTitleM?.[1] || '').replace(/<[^>]*>/g,'').trim();

      const getField = (block, tag) => {
        const re = new RegExp(`<${tag}[^>]*>(?:<!\\[CDATA\\[)?([\\s\\S]*?)(?:\\]\\]>)?<\\/${tag}>`, 'i');
        return (block.match(re)?.[1] || '').replace(/<[^>]*>/g,'').trim();
      };

      const parsed = itemMatches.slice(0, 5).map(m => {
        const block = m[1];
        const headline = getField(block, 'title');
        const rawDesc  = getField(block, 'description').slice(0, 160);
        const pubDate  = getField(block, 'pubDate');
        const guid     = getField(block, 'guid');
        const linkM    = block.match(/<link[^>]*>\s*(https?:\/\/[^\s<]+)/i);
        const link     = linkM?.[1] || (guid.startsWith('http') ? guid : '#');
        let dateStr = '';
        try { if (pubDate) dateStr = new Date(pubDate).toLocaleString('zh-TW',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); } catch {}
        return { headline, summary: rawDesc ? rawDesc+'…' : '點擊閱讀全文', date: dateStr, link, source: channelTitle };
      }).filter(n => n.headline.length > 3);

      if (parsed.length > 0) return parsed;
    } catch(e) { continue; }
  }
  throw new Error('all feeds/proxies failed');
}

function guessTag(headline) {
  const h = (headline || '').toLowerCase();
  if (/stock|market|nasdaq|s&p|dow|股市|大盤|上漲|下跌/.test(h)) return '股市';
  if (/trade|tariff|export|import|貿易|關稅|出口|進口/.test(h)) return '貿易';
  if (/inflation|cpi|通膨|物價|漲價/.test(h)) return '通膨';
  if (/fed|interest rate|利率|升息|降息|央行/.test(h)) return '利率';
  if (/tech|ai|semiconductor|晶片|半導體|chip|科技|人工智慧/.test(h)) return '科技';
  if (/oil|energy|crude|石油|能源/.test(h)) return '能源';
  if (/gdp|growth|recession|景氣|成長|衰退/.test(h)) return 'GDP';
  if (/gold|silver|黃金|銅|copper|鐵礦/.test(h)) return '大宗商品';
  if (/tsmc|台積電/.test(h)) return '台積電';
  if (/taiwan|台灣|台股|taiex/.test(h)) return '台灣';
  if (/美股|美元|聯準會|fed|s&p/.test(h)) return '美股';
  if (/外資|法人|主力|融資/.test(h)) return '籌碼';
  return '財經';
}

// Yahoo Finance v8 chart API — try multiple proxies
async function fetchYahooQuote(ticker) {
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=2d&includePrePost=false`;

  const proxyFactories = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    u => `https://thingproxy.freeboard.io/fetch/${u}`,
  ];

  for (const makeProxy of proxyFactories) {
    try {
      const r = await fetch(makeProxy(yahooUrl), { signal: AbortSignal.timeout(10000) });
      if (!r.ok) continue;
      const raw = await r.text();
      let json;
      try {
        const parsed = JSON.parse(raw);
        // allorigins wraps content
        json = parsed.contents ? JSON.parse(parsed.contents) : parsed;
      } catch { continue; }

      const meta = json?.chart?.result?.[0]?.meta;
      if (!meta || !meta.regularMarketPrice) continue;

      const price = meta.regularMarketPrice;
      const prev  = meta.chartPreviousClose || meta.regularMarketPreviousClose || price;
      const pct   = prev ? ((price - prev) / prev * 100) : 0;

      return {
        price,
        change: (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%',
        trend: pct > 0.05 ? 'up' : pct < -0.05 ? 'down' : 'flat',
        currency: meta.currency || 'USD',
        time: meta.regularMarketTime
          ? new Date(meta.regularMarketTime * 1000).toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'})
          : '',
      };
    } catch(e) { continue; }
  }
  throw new Error('no proxy succeeded for ' + ticker);
}

function formatPrice(price, currency) {
  if (price == null) return 'N/A';
  return new Intl.NumberFormat('en-US', {
    minimumFractionDigits: currency === 'TWD' ? 0 : 2,
    maximumFractionDigits: currency === 'TWD' ? 0 : 2,
  }).format(price);
}

const PHRASE_BANK = [
  {phrase:'in terms of',context:'In terms of performance, this quarter was outstanding.',meaning:'Regarding; with respect to',zh:'就…而言；在…方面'},
  {phrase:'carry out',context:'We need to carry out further research before launching.',meaning:'To do or complete a task',zh:'執行；實施'},
  {phrase:'break down',context:'The negotiations broke down after two days.',meaning:'To fail; to stop working; to separate into parts',zh:'故障；崩潰；分解'},
  {phrase:'take into account',context:'Please take into account the budget limits.',meaning:'To consider something when making a decision',zh:'把…納入考量；考慮到'},
  {phrase:'bring about',context:'New technology can bring about major changes.',meaning:'To cause something to happen',zh:'帶來；導致（改變）'},
  {phrase:'as a result of',context:'Sales increased as a result of the campaign.',meaning:'Because of; due to',zh:'由於；作為…的結果'},
  {phrase:'be in charge of',context:'She is in charge of the marketing department.',meaning:'To be responsible for managing something',zh:'負責；主管'},
  {phrase:'draw attention to',context:'The report draws attention to key risks.',meaning:'To make people notice something',zh:'引起注意；指出'},

  {phrase:'set up',context:'We plan to set up a new office in Taipei.',meaning:'To establish or arrange something',zh:'建立；設立'},
  {phrase:'follow up',context:'I will follow up with the client after the meeting.',meaning:'To check on progress after an initial action',zh:'追蹤；後續跟進'},
  {phrase:'cut down on',context:'The company is trying to cut down on waste.',meaning:'To reduce the amount of something',zh:'減少；削減'},
  {phrase:'deal with',context:'We need to deal with this issue immediately.',meaning:'To handle or take action on a problem',zh:'處理；應對'},
  {phrase:'put off',context:'The meeting was put off until next week.',meaning:'To delay or postpone something',zh:'推遲；延後'},
  {phrase:'rule out',context:'We cannot rule out the possibility of a merger.',meaning:'To exclude or decide something is impossible',zh:'排除；否定可能性'},
  {phrase:'make up for',context:'Extra sales in Q4 helped make up for earlier losses.',meaning:'To compensate for something negative',zh:'彌補；補償'},
  {phrase:'fall short of',context:'The results fell short of our expectations.',meaning:'To fail to reach a target or standard',zh:'未達到；低於預期'},
];

let vocabQueue = [];
let currentWord = 0;
let score = {correct:0, total:0};
let streak = 0;
let answered = false;
let currentPhraseIdx = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initEnglish() {
  const mode = document.getElementById('en-mode').value;
  score = {correct:0,total:0};
  streak = 0;
  currentWord = 0;
  currentPhraseIdx = 0;
  answered = false;
  vocabQueue = shuffle(VOCAB_BANK); // shuffled, no repeats until full cycle
  if(mode==='vocab') renderVocabQuiz();
  else renderPhrase();
}

function renderVocabQuiz() {
  if (currentWord >= vocabQueue.length) {
    // Completed one full cycle — reshuffle for next round
    vocabQueue = shuffle(VOCAB_BANK);
    currentWord = 0;
  }
  const item = vocabQueue[currentWord];
  answered = false;

  // Shuffle options
  const opts = shuffle(item.options);

  document.getElementById('quiz-area').innerHTML = `
    <div class="word-card-big">
      <div class="word-main">${item.word}</div>
      <div class="word-phonetic">${item.phonetic}</div>
      <span class="word-type-badge">${item.type}</span>
      <div class="word-definition">${item.def}</div>
      <div class="word-example">${item.example}</div>
    </div>

    <div style="font-size:0.8rem;color:var(--text3);margin-bottom:0.75rem;font-family:var(--mono)">選出正確的中文意思　${currentWord+1} / ${vocabQueue.length}</div>
    <div class="en-options" id="options">
      ${opts.map(o=>`<button class="option-btn" onclick="checkAnswer(this,'${o.replace(/'/g,"\\'")}','${item.zh.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
    </div>

    <div class="en-controls">
      <button class="option-btn" style="padding:0.5rem 1rem" onclick="nextWord()">跳過 →</button>
      <span class="en-score">✓ ${score.correct} / ${score.total}</span>
    </div>
    <div class="word-streak">${streak>2?'<span class="streak-fire">🔥</span> 連答 '+streak+' 題！':''}</div>`;
}

function checkAnswer(btn, chosen, correct) {
  if(answered) return;
  answered = true;
  score.total++;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b=>{
    b.disabled = true;
    if(b.textContent.trim() === correct) b.classList.add('correct');
  });
  if(chosen===correct) { btn.classList.add('correct'); score.correct++; streak++; }
  else { btn.classList.add('wrong'); streak=0; }

  const item = vocabQueue[currentWord];
  const zh = document.createElement('div');
  zh.className = 'word-zh';
  zh.textContent = '中文：' + item.zh;
  document.querySelector('.word-card-big').appendChild(zh);
  document.querySelector('.en-score').textContent = `✓ ${score.correct} / ${score.total}`;
  document.querySelector('.word-streak').innerHTML = streak>2?`<span class="streak-fire">🔥</span> 連答 ${streak} 題！`:'';

  setTimeout(()=>{ currentWord++; renderVocabQuiz(); }, 1200);
}

function nextWord() {
  currentWord++;
  renderVocabQuiz();
}

function renderPhrase() {
  const item = PHRASE_BANK[currentPhraseIdx % PHRASE_BANK.length];
  document.getElementById('quiz-area').innerHTML = `
    <div class="phrase-card">
      <div class="phrase-main">${item.phrase}</div>
      <div class="phrase-context">${item.context}</div>
      <div class="phrase-meaning">${item.meaning}</div>
      <div class="phrase-zh">${item.zh}</div>
    </div>
    <div class="en-controls">
      <button class="option-btn" style="padding:0.5rem 1rem" onclick="prevPhrase()">← 上一個</button>
      <button class="option-btn" style="padding:0.5rem 1rem" onclick="nextPhrase()">下一個 →</button>
      <span class="en-score">${currentPhraseIdx+1} / ${PHRASE_BANK.length}</span>
    </div>`;
}

function prevPhrase() { currentPhraseIdx = Math.max(0, currentPhraseIdx-1); renderPhrase(); }
function nextPhrase() { currentPhraseIdx++; renderPhrase(); }

// ============ INIT ============
initialized.news = true;
loadNews();
</script>
